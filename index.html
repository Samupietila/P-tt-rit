<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESCAPE TERMINAL</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Courier New',monospace;
    background:black;
    color:#00ff88;
    overflow:hidden;
}

/* STARS */
.stars{position:fixed;width:100%;height:100%;}
.star{
    position:absolute;
    width:2px;height:2px;
    background:white;
    animation:twinkle 3s infinite;
}
@keyframes twinkle{0%,100%{opacity:0.2;}50%{opacity:1;}}

/* CONTAINER */
.container{
    position:relative;
    z-index:2;
    max-width:700px;
    margin:auto;
    margin-top:5vh;
    background:rgba(0,0,0,0.9);
    border:2px solid #00ff88;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 30px #00ff88;
}

/* TITLE */
h1{
    text-align:center;
    animation:glitch 1s infinite;
}
@keyframes glitch{
    0%{text-shadow:2px 0 red;}
    50%{text-shadow:-2px 0 blue;}
    100%{text-shadow:2px 0 red;}
}

.subtitle{text-align:center;margin-bottom:20px;}

/* START */
#startButton{
    display:block;
    margin:30px auto;
    padding:15px 40px;
    background:#00ff88;
    border:none;
    cursor:pointer;
    font-size:1.2em;
}

/* TERMINAL TEXT */
#intro{
    height:120px;
    white-space:pre-line;
    margin-bottom:20px;
    color:#00ccff;
}

/* TIMER */
#time{
    font-size:2.5em;
    display:block;
    text-align:center;
    margin:20px;
}

/* WARNING */
.warning{
    animation:blink 0.3s infinite;
}
@keyframes blink{
    0%,100%{background:red;color:black;}
    50%{background:black;color:red;}
}

/* INPUT */
.input-group{display:flex;gap:10px;}
input{
    flex:1;
    padding:10px;
    background:black;
    border:2px solid #00ff88;
    color:#00ff88;
}
button.submit{
    padding:10px;
    background:#00ff88;
    border:none;
}

/* RESULT */
.result{
    margin-top:20px;
    display:none;
    font-weight:bold;
    font-size:1.2em;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">
<h1>⚡ SYSTEM BREACH ⚡</h1>
<div class="subtitle">>> unauthorized idiot detected <<</div>

<button id="startButton">▶ ENTER SYSTEM</button>

<div id="game" style="display:none;">

<div id="intro"></div>

<div id="time">300</div>

<div class="input-group">
<input id="code">
<button class="submit" id="submit">UNLOCK</button>
</div>

</div>

<div id="result" class="result"></div>
</div>

<script>
// STARS
for(let i=0;i<120;i++){
    let s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    document.getElementById('stars').appendChild(s);
}

// TYPEWRITER
const introText=[
"> booting system...",
"> scanning brain activity...",
"> result: questionable intelligence detected",
"> access denied",
"> just kidding... or am I?",
"> find the damn code before system fries you 🔥"
];

function typeText(lines,el,cb){
    let i=0;
    function nextLine(){
        if(i>=lines.length){cb();return;}
        let text=lines[i];
        let j=0;
        let interval=setInterval(()=>{
            el.textContent+=text[j];
            j++;
            if(j>=text.length){
                clearInterval(interval);
                el.textContent+="\n";
                i++;
                setTimeout(nextLine,300);
            }
        },30);
    }
    nextLine();
}

// GAME
let time=300;
let timer=null;

const startBtn=document.getElementById('startButton');
const game=document.getElementById('game');
const intro=document.getElementById('intro');
const timeEl=document.getElementById('time');
const result=document.getElementById('result');

startBtn.onclick=()=>{
    startBtn.style.display='none';
    game.style.display='block';

    typeText(introText,intro,()=>{
        timer=setInterval(()=>{
            time--;
            timeEl.textContent=time;

            if(time<=10){
                timeEl.classList.add('warning');
            }

            if(time<=0){
                clearInterval(timer);
                show("💀 SYSTEM OWNED YOU. EMBARRASSING.", "red");
            }
        },1000);
    });
};

// SUBMIT
document.getElementById('submit').onclick=()=>{
    let val=document.getElementById('code').value.toUpperCase();

    if(val==="REVEAL"){
        clearInterval(timer);
        show("😈 YOU ESCAPED. LUCKY BASTARD.", "#00ff88");
    } else {
        show("❌ WRONG. MY GRANDMA HACKS BETTER.", "#ff0064");
    }
};

function show(msg,color){
    result.style.display='block';
    result.style.color=color;
    result.textContent=msg;
}
</script>

</body>
</html>
