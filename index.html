<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Game</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 5px; }
        h1 { text-align: center; }
        #timer { font-size: 24px; margin: 20px 0; }
        .hint { margin: 10px 0; }
        input[type='text'] { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #218838; }
        .result { margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Escape Room Game</h1>
        <div id="timer">Time Left: <span id="time">300</span> seconds</div>
        <div class="hint">Hint: Guess the codeword to escape!</div>
        <input type="text" id="codeword" placeholder="Enter codeword here">
        <button id="submit">Submit</button>
        <div class="result" id="result"></div>
    </div>
    <script>
        let timeLeft = 300;
        const timerDisplay = document.getElementById('time');
        const resultDiv = document.getElementById('result');
        const submitButton = document.getElementById('submit');
        const codewordInput = document.getElementById('codeword');
        const correctCodeword = 'REVEAL'; // Example codeword

        const timer = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                showResult('Time is up! You could not escape.');
            }
        }, 1000);

        submitButton.addEventListener('click', () => {
            const enteredCodeword = codewordInput.value;
            if (enteredCodeword.toUpperCase() === correctCodeword) {
                clearInterval(timer);
                showResult('Congratulations! You escaped successfully!');
            } else {
                showResult('Incorrect codeword. Try again!');
            }
        });

        function showResult(message) {
            resultDiv.textContent = message;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
