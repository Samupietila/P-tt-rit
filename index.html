<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Game - Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: #00ff88;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            width: 90%;
            background: rgba(15, 12, 41, 0.9);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3), inset 0 0 30px rgba(0, 255, 136, 0.1);
            animation: slideIn 0.6s ease-out;
            backdrop-filter: blur(10px);
            text-align: center;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            letter-spacing: 3px;
        }

        .subtitle {
            color: #00ccff;
            font-size: 0.9em;
            margin-bottom: 30px;
        }

        .timer-container {
            margin: 30px 0;
        }

        #time {
            font-size: 2.5em;
            font-weight: bold;
        }

        .hint {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid #00ff88;
            padding: 15px;
            margin: 25px 0;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 25px 0;
        }

        input {
            flex: 1;
            padding: 10px;
            background: black;
            border: 2px solid #00ff88;
            color: #00ff88;
        }

        button {
            padding: 12px 25px;
            background: #00ff88;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .result {
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
    <h1>⚡ ESCAPE ROOM ⚡</h1>
    <div class="subtitle">&gt;&gt;&gt; SYSTEM LOCKDOWN MODE &lt;&lt;&lt;</div>

    <!-- ALOITUSNAPPI -->
    <button id="startButton">▶ ALOITA</button>

    <!-- PELI (PIILOSSA ALUKSI) -->
    <div id="gameContent" style="display:none;">

        <div class="timer-container">
            ⏱️ TIME: <span id="time">300</span>s
        </div>

        <div class="hint">
            💡 HINT: A single word can unlock the system...
        </div>

        <div class="input-group">
            <input type="text" id="codeword" placeholder="Enter codeword">
            <button id="submit">SUBMIT</button>
        </div>

    </div>

    <div class="result" id="result"></div>
</div>

<script>
    // Stars
    function generateStars() {
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            starsContainer.appendChild(star);
        }
    }
    generateStars();

    let timeLeft = 300;
    let timer = null;

    const timerDisplay = document.getElementById('time');
    const resultDiv = document.getElementById('result');
    const submitButton = document.getElementById('submit');
    const codewordInput = document.getElementById('codeword');
    const correctCodeword = 'REVEAL';

    const startButton = document.getElementById('startButton');
    const gameContent = document.getElementById('gameContent');

    // START BUTTON
    startButton.addEventListener('click', () => {
        gameContent.style.display = 'block';
        startButton.style.display = 'none';

        timer = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                showResult('⏰ TIME IS UP!', 'timeout');
                submitButton.disabled = true;
            }
        }, 1000);
    });

    // SUBMIT
    submitButton.addEventListener('click', () => {
        const entered = codewordInput.value.trim().toUpperCase();

        if (entered === correctCodeword) {
            clearInterval(timer);
            showResult('✓ YOU ESCAPED!', 'success');
            submitButton.disabled = true;
        } else {
            showResult('✗ WRONG CODE', 'error');
        }
    });

    function showResult(msg, type) {
        resultDiv.textContent = msg;
        resultDiv.style.display = 'block';
    }
</script>

</body>
</html>
