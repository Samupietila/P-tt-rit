<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escape Room Game - Terminal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: #00ff88;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 700px;
            width: 90%;
            background: rgba(15, 12, 41, 0.9);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3), inset 0 0 30px rgba(0, 255, 136, 0.1);
            animation: slideIn 0.6s ease-out;
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            letter-spacing: 3px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
            }
            50% {
                text-shadow: 0 0 40px rgba(0, 255, 136, 1);
            }
        }

        .subtitle {
            text-align: center;
            color: #00ccff;
            font-size: 0.9em;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
        }

        .timer-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0;
            gap: 15px;
        }

        #timer {
            font-size: 1.2em;
            color: #00ff88;
            letter-spacing: 2px;
        }

        #time {
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 1s ease-in-out infinite;
            min-width: 100px;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hint {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid #00ff88;
            padding: 15px;
            margin: 25px 0;
            border-radius: 5px;
            font-size: 0.95em;
            color: #00ffcc;
            animation: slideInLeft 0.8s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin: 25px 0;
            animation: slideInUp 0.8s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input[type='text'] {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 255, 136, 0.05);
            border: 2px solid #00ff88;
            border-radius: 8px;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type='text']::placeholder {
            color: rgba(0, 255, 136, 0.5);
        }

        input[type='text']:focus {
            border-color: #00ccff;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5), inset 0 0 10px rgba(0, 255, 136, 0.1);
            background: rgba(0, 255, 136, 0.08);
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #0f0c29;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.3s ease;
            z-index: -1;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.5);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 1.2em;
            font-weight: bold;
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .result.success {
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }

        .result.error {
            background: rgba(255, 0, 100, 0.2);
            border: 2px solid #ff0064;
            color: #ff6688;
            box-shadow: 0 0 30px rgba(255, 0, 100, 0.3);
        }

        .result.timeout {
            background: rgba(255, 165, 0, 0.2);
            border: 2px solid #ffa500;
            color: #ffaa55;
            box-shadow: 0 0 30px rgba(255, 165, 0, 0.3);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .container {
                padding: 25px;
                border-width: 1.5px;
            }

            #time {
                font-size: 2em;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <h1>⚡ ESCAPE ROOM ⚡</h1>
        <div class="subtitle">&gt;&gt;&gt; SYSTEM LOCKDOWN MODE &lt;&lt;&lt;</div>

        <div class="timer-container">
            <div id="timer">⏱️ TIME: <span id="time">300</span>s</div>
        </div>

        <div class="hint">
            💡 HINT: A single word can unlock the system. What must be revealed to escape? Think carefully...
        </div>

        <div class="input-group">
            <input type="text" id="codeword" placeholder="Enter codeword here..." autocomplete="off">
            <button id="submit">SUBMIT</button>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        // Generate random stars
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        generateStars();

        let timeLeft = 300;
        const timerDisplay = document.getElementById('time');
        const resultDiv = document.getElementById('result');
        const submitButton = document.getElementById('submit');
        const codewordInput = document.getElementById('codeword');
        const correctCodeword = 'REVEAL';

        const timer = setInterval(() => {
            timeLeft--;
            timerDisplay.textContent = timeLeft;

            // Change color as time runs out
            if (timeLeft <= 30) {
                timerDisplay.style.color = '#ff0064';
            } else if (timeLeft <= 60) {
                timerDisplay.style.color = '#ffa500';
            }

            if (timeLeft <= 0) {
                clearInterval(timer);
                showResult('⏰ TIME IS UP! SYSTEM LOCKED. YOU COULD NOT ESCAPE.', 'timeout');
                submitButton.disabled = true;
            }
        }, 1000);

        submitButton.addEventListener('click', () => {
            const enteredCodeword = codewordInput.value.trim().toUpperCase();
            if (enteredCodeword === correctCodeword) {
                clearInterval(timer);
                showResult('✓ SYSTEM UNLOCKED! CONGRATULATIONS! YOU ESCAPED SUCCESSFULLY!', 'success');
                submitButton.disabled = true;
            } else if (enteredCodeword === '') {
                showResult('⚠ PLEASE ENTER A CODEWORD!', 'error');
            } else {
                showResult('✗ INCORRECT CODEWORD. SYSTEM REMAINS LOCKED. TRY AGAIN!', 'error');
            }
        });

        codewordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                submitButton.click();
            }
        });

        function showResult(message, type) {
            resultDiv.textContent = message;
            resultDiv.className = 'result ' + type;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
